name: RyzenTuner Debug Build

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug

jobs:
  build:
    strategy:
      matrix:
        configuration: [ Debug ]
        platform: [ Any CPU ]

    runs-on: windows-latest
    
    env:
      Solution_Name: RyzenTuner.sln
      Project_Name: RyzenTuner
      Output_Dir: bin/Debug

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1

      - name: Restore Packages
        run: nuget restore $env:Solution_Name

      - name: Build
        run: msbuild $env:Solution_Name /p:Configuration="$env:configuration" /p:Platform="$env:platform"
        env:
          configuration: ${{ matrix.configuration }}
          platform: ${{ matrix.platform }}

      - name: Verify native dependencies
        shell: pwsh
        run: |
          $outputDir = $env:Output_Dir
          $requiredFiles = @(
            "libryzenadj.dll",
            "inpoutx64.dll",
            "WinRing0x64.dll",
            "WinRing0x64.sys"
          )

          foreach ($file in $requiredFiles) {
            $matches = Get-ChildItem -Path $outputDir -Filter $file -Recurse -File
            if ($matches.Count -eq 0) {
              throw "Missing required native dependency: $outputDir/$file"
            }
          }

      - name: Generate artifact name
        id: generate-name
        run: |
          echo "artifact=${{ github.event.repository.name }}.${{ github.ref_name }}.${{ github.run_id }}.zip" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.generate-name.outputs.artifact }}
          path: ./${{ env.Output_Dir }}
